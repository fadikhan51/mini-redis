version: '3.8'

services:
  mini-redis:
    build:
      context: ../../
      dockerfile: docker/app/Dockerfile
    ports:
      - "8080:8080"
      - "6379:6379"
    env_file:
      - ../../.env.docker
    depends_on:
      ministack:
        condition: service_healthy
    networks:
      - mini-redis-net

  ministack:
    image: ${MINISTACK_IMAGE:-ministackorg/ministack:latest}
    ports:
      - "4566:4566"
    environment:
      - GATEWAY_PORT=4566
      - MINISTACK_HOST=ministack
      - MINISTACK_REGION=us-east-1
      - LOG_LEVEL=INFO
      - SERVICES=elasticache
      - ELASTICACHE_BASE_PORT=16379
      - DOCKER_NETWORK=mini-redis-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mini-redis-net

networks:
  mini-redis-net:
    name: mini-redis-net
